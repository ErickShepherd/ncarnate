name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# No system HDF libraries are installed anywhere in this workflow on
# purpose: the netCDF4 wheels bundle libhdf5/libnetcdf, and the pyhdf
# >= 0.11.6 manylinux wheels bundle libhdf4 (verified against PyPI
# 2026-07-08 for cp310-cp313). Platforms without a pyhdf wheel (e.g.
# linux-aarch64) need a system libhdf4 for the sdist build instead.

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Run ruff
        run: ruff check .

  test:
    name: pytest (${{ matrix.os }} py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Smoke the cross-platform binary-wheel install story (pyhdf +
        # netCDF4 + pyproj wheels, no system HDF libs) that the README
        # advertises — one Python each on macOS and Windows.
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests (offline; raw-granule marks self-skip)
        run: python -m pytest -q

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
