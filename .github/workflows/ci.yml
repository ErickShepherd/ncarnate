name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# The pip-based jobs (test, test-windows-degraded, build) install no system
# HDF libraries on purpose: the netCDF4 wheels bundle libhdf5/libnetcdf, and
# the pyhdf >= 0.11.6 manylinux wheels bundle libhdf4 (verified against PyPI
# 2026-07-08 for cp310-cp313). Platforms without a pyhdf wheel (e.g.
# linux-aarch64) need a system libhdf4 for the sdist build instead. The
# one deliberate exception is test-conda-forge, which provisions the whole
# runtime stack (incl. a system-HDF4-linked pyhdf) from conda-forge to prove
# the *supported* install channel delivers full HDF4 capability (KD-L7, G2).

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install ruff
        # Minor-pinned so a future ruff release can't red a green branch with
        # no code change (new lint rules land in version bumps). Bump
        # deliberately; keep in step with the version developers run locally.
        run: python -m pip install "ruff==0.15.*"
      - name: Run ruff
        run: ruff check .

  test:
    name: pytest (${{ matrix.os }} py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Smoke the self-contained-wheel install story (pyhdf + netCDF4 +
        # pyproj, no system HDF libs) on macOS too. Windows is deliberately
        # excluded from the *full* matrix: pyhdf's Windows wheel ships no
        # HDF4 runtime, so the HDF4 fixtures can't run there. Windows-pip
        # instead gets the dedicated degraded-capability job below
        # (KD-L4/KD-L7), which pins exactly what must keep working — and
        # exactly how the HDF4 path must refuse — without a usable pyhdf.
        include:
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests (offline; raw-granule marks self-skip)
        run: python -m pytest -q

  test-windows-degraded:
    name: pytest degraded-capability (windows pip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package with test extras (pip wheels only)
        # pyhdf's Windows wheel *installs* but cannot *import* (it ships no
        # HDF4 runtime) — which is precisely the degraded environment this
        # job exists to pin (KD-L4/KD-L7, gate G2).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Degraded-capability contract (tests/test_optional_hdf4.py)
        # The purpose-built matrix: import / --help / --version / detection /
        # netCDF recompression / audits all work without a usable pyhdf; an
        # HDF4 attempt refuses with the stable HDF4_RUNTIME_UNAVAILABLE
        # message before output creation, never an import traceback.
        run: python -m pytest tests/test_optional_hdf4.py -q

  test-conda-forge:
    name: pytest full-capability (conda-forge)
    runs-on: ubuntu-latest
    # conda-forge is the *supported* HDF4 install channel (the refusal and
    # the README point Windows/aarch64 users at `conda install -c
    # conda-forge ncarnate`). This lane proves that channel actually
    # delivers the full HDF4/HDF-EOS2 capability — a promise the pip matrix
    # cannot make, since it relies on the bundled-libhdf4 pyhdf wheels
    # rather than the conda-forge pyhdf built against a system HDF4
    # (KD-L7 / priority step 2.5; gate G2 cannot close without it).
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5.1.0
      - name: Provision a conda-forge full-capability environment
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0
        with:
          environment-name: ncarnate-cf
          # The runtime stack comes wholly from conda-forge — pyhdf here is
          # built against a real HDF4 library, unlike the pip wheel's
          # bundled runtime. Pin Python; float the rest to what the channel
          # currently ships (the point is the channel's promise, not a
          # frozen resolution).
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          create-args: >-
            python=3.12
            pyhdf
            netCDF4
            numpy
            pyproj
            tqdm
            pytest
      - name: Install ncarnate from source without replacing native deps
        # --no-deps: install only ncarnate; the native stack (pyhdf,
        # netCDF4, numpy, pyproj, tqdm) stays the conda-forge build. Build
        # isolation still fetches the hatchling backend into a throwaway
        # env, which never touches the runtime dependencies above.
        run: python -m pip install -e . --no-deps
      - name: Prove the conda-forge HDF4 runtime imports
        run: |
          python -c "from ncarnate.hdf4_runtime import require_hdf4_runtime; require_hdf4_runtime(); print('conda-forge HDF4 runtime OK')"
      - name: Full suite — HDF4 import, conversion, audit, manifest on real fixtures
        # The committed HDF4/HDF-EOS2 fixtures drive real conversions here
        # (unlike the pip matrix's bundled-wheel path), exercising the
        # supported channel end to end. Raw-granule tests self-skip offline.
        run: python -m pytest -q

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Validate distributions
        run: >-
          python tools/validate_distributions.py
          --allowed-email dev@erickshepherd.com
          --allowed-email ca@trufo.ai
          dist/*
